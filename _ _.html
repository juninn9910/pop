<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인사 표현 게임</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Nanum+Gothic+Coding&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: oklch(0.72 0.18 145);
    --green-light: oklch(0.94 0.07 145);
    --yellow: oklch(0.88 0.16 90);
    --yellow-dark: oklch(0.72 0.16 80);
    --blue: oklch(0.65 0.16 240);
    --blue-light: oklch(0.93 0.06 240);
    --red: oklch(0.62 0.22 25);
    --red-light: oklch(0.94 0.07 25);
    --bg: oklch(0.98 0.01 90);
    --text: oklch(0.22 0.02 240);
    --card: #ffffff;
    --shadow: 0 4px 20px oklch(0.5 0.05 240 / 0.15);
  }

  body {
    font-family: 'Nanum Gothic', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 20px 16px 40px;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    width: 100%;
    max-width: 700px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .header-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-title .icon { font-size: 28px; }
  .score-badge {
    background: var(--yellow);
    border-radius: 50px;
    padding: 8px 18px;
    font-size: 18px;
    font-weight: 800;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    width: 100%;
    max-width: 700px;
    margin-bottom: 20px;
  }
  .progress-label {
    font-size: 14px;
    font-weight: 700;
    color: oklch(0.5 0.05 240);
    margin-bottom: 6px;
  }
  .progress-bar {
    width: 100%;
    height: 12px;
    background: oklch(0.9 0.03 240);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), oklch(0.78 0.18 175));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }

  /* ── QUESTION CARD ── */
  .question-card {
    width: 100%;
    max-width: 700px;
    background: var(--card);
    border-radius: 24px;
    box-shadow: var(--shadow);
    padding: 28px 28px 24px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--green), var(--yellow-dark));
  }
  .q-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--green-light);
    color: var(--green);
    font-size: 13px;
    font-weight: 800;
    padding: 5px 14px;
    border-radius: 99px;
    margin-bottom: 14px;
  }
  .scene-box {
    background: var(--blue-light);
    border-radius: 18px;
    padding: 22px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .scene-emoji {
    font-size: 64px;
    line-height: 1;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .scene-desc {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    text-align: center;
    line-height: 1.4;
    word-break: keep-all;
  }
  .scene-sub {
    font-size: 15px;
    color: oklch(0.45 0.06 240);
    text-align: center;
    word-break: keep-all;
  }
  .q-ask {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
    word-break: keep-all;
  }

  /* ── ANSWER BUTTONS ── */
  .answers {
    width: 100%;
    max-width: 700px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 20px;
  }
  .ans-btn {
    background: var(--card);
    border: 3px solid oklch(0.88 0.04 240);
    border-radius: 18px;
    padding: 18px 14px;
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
    cursor: pointer;
    transition: all 0.18s;
    box-shadow: 0 3px 0 oklch(0.84 0.04 240);
    position: relative;
    overflow: hidden;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    word-break: keep-all;
  }
  .ans-btn:hover:not(:disabled) {
    transform: translateY(-3px);
    border-color: var(--blue);
    box-shadow: 0 6px 0 var(--blue);
    background: var(--blue-light);
  }
  .ans-btn:active:not(:disabled) {
    transform: translateY(1px);
    box-shadow: 0 1px 0 oklch(0.84 0.04 240);
  }
  .ans-btn.correct {
    border-color: var(--green);
    background: var(--green-light);
    box-shadow: 0 3px 0 var(--green);
    animation: correctPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .ans-btn.wrong {
    border-color: var(--red);
    background: var(--red-light);
    box-shadow: 0 3px 0 var(--red);
    animation: shake 0.4s;
  }
  .ans-btn.reveal {
    border-color: var(--green);
    background: var(--green-light);
  }
  @keyframes correctPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  /* ── FEEDBACK OVERLAY ── */
  .feedback-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 100;
  }
  .feedback-bubble {
    background: white;
    border-radius: 24px;
    padding: 28px 40px;
    box-shadow: 0 12px 48px oklch(0.3 0.08 240 / 0.3);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    opacity: 0;
    transform: scale(0.6);
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .feedback-bubble.show {
    opacity: 1;
    transform: scale(1);
  }
  .feedback-bubble.correct-fb { border: 4px solid var(--green); }
  .feedback-bubble.wrong-fb { border: 4px solid var(--red); }
  .feedback-icon { font-size: 64px; line-height: 1; }
  .feedback-text { font-size: 26px; font-weight: 800; }
  .feedback-text.correct-fb { color: var(--green); }
  .feedback-text.wrong-fb { color: var(--red); }
  .feedback-sub { font-size: 16px; color: oklch(0.45 0.04 240); font-weight: 700; }

  /* ── NEXT BUTTON ── */
  .next-btn {
    width: 100%;
    max-width: 700px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 18px;
    padding: 20px;
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 22px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 0 oklch(0.55 0.2 145);
    display: none;
  }
  .next-btn.visible {
    display: block;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 oklch(0.55 0.2 145); }
  .next-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 oklch(0.55 0.2 145); }

  /* ── RESULT SCREEN ── */
  .result-screen {
    display: none;
    width: 100%;
    max-width: 700px;
    background: var(--card);
    border-radius: 28px;
    box-shadow: var(--shadow);
    padding: 40px 32px;
    text-align: center;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .result-screen.show { display: flex; }
  .result-emoji { font-size: 80px; }
  .result-title { font-size: 32px; font-weight: 800; color: var(--text); }
  .result-score { font-size: 22px; font-weight: 700; color: oklch(0.45 0.06 240); }
  .stars { font-size: 40px; letter-spacing: 4px; }
  .result-msg {
    background: var(--green-light);
    border-radius: 16px;
    padding: 16px 20px;
    font-size: 18px;
    font-weight: 700;
    color: var(--green);
    line-height: 1.5;
    word-break: keep-all;
  }
  .retry-btn {
    background: var(--yellow);
    border: none;
    border-radius: 18px;
    padding: 18px 40px;
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    cursor: pointer;
    box-shadow: 0 4px 0 var(--yellow-dark);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .retry-btn:hover { transform: translateY(-2px); }

  /* ── CONFETTI ── */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -20px;
    border-radius: 2px;
    animation: fall linear forwards;
    pointer-events: none;
    z-index: 200;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ── INTRO SCREEN ── */
  .intro-screen {
    width: 100%;
    max-width: 700px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 20px 0;
  }
  .intro-title {
    font-size: 36px;
    font-weight: 800;
    color: var(--text);
    text-align: center;
    line-height: 1.3;
    word-break: keep-all;
  }
  .intro-title span { color: var(--green); }
  .intro-emoji-row { font-size: 52px; display: flex; gap: 16px; }
  .intro-desc {
    font-size: 18px;
    color: oklch(0.45 0.06 240);
    text-align: center;
    line-height: 1.6;
    word-break: keep-all;
  }
  .intro-rules {
    background: var(--blue-light);
    border-radius: 20px;
    padding: 20px 24px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .rule-item {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    word-break: keep-all;
  }
  .rule-num {
    width: 32px; height: 32px;
    background: var(--blue);
    color: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 800;
    flex-shrink: 0;
  }
  .start-btn {
    background: var(--green);
    color: white;
    border: none;
    border-radius: 20px;
    padding: 22px 60px;
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 26px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 6px 0 oklch(0.55 0.2 145);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .start-btn:hover { transform: translateY(-3px); box-shadow: 0 9px 0 oklch(0.55 0.2 145); }
  .start-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 oklch(0.55 0.2 145); }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">
    <span class="icon">🙋</span>
    인사 표현 게임
  </div>
  <div class="score-badge" id="scoreDisplay">⭐ 0점</div>
</div>

<!-- INTRO -->
<div class="intro-screen" id="introScreen">
  <div class="intro-emoji-row">🧑‍🤝‍🧑 🏫 👴</div>
  <div class="intro-title">상대와 상황에 맞는<br><span>인사말</span>을 골라봐요!</div>
  <div class="intro-desc">친구에게? 선생님에게? 어른에게?<br>상황에 맞는 인사 표현을 찾아봐요.</div>
  <div class="intro-rules">
    <div class="rule-item"><div class="rule-num">1</div>상황 그림을 잘 살펴보세요.</div>
    <div class="rule-item"><div class="rule-num">2</div>알맞은 인사말 버튼을 눌러요.</div>
    <div class="rule-item"><div class="rule-num">3</div>맞으면 ⭐점수가 올라가요!</div>
    <div class="rule-item"><div class="rule-num">4</div>총 8문제를 다 풀면 결과가 나와요.</div>
  </div>
  <button class="start-btn" onclick="startGame()">🎮 게임 시작!</button>
</div>

<!-- GAME -->
<div id="gameArea" style="display:none; width:100%; max-width:700px; flex-direction:column; align-items:center; gap:0;">
  <div class="progress-wrap">
    <div class="progress-label" id="progressLabel">1 / 8 문제</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="question-card" id="questionCard">
    <div class="q-tag" id="qTag">📌 상대에 따른 인사</div>
    <div class="scene-box">
      <div class="scene-emoji" id="sceneEmoji">👫</div>
      <div class="scene-desc" id="sceneDesc">상황 설명</div>
      <div class="scene-sub" id="sceneSub">보조 설명</div>
    </div>
    <div class="q-ask">👆 알맞은 인사말을 골라보세요!</div>
  </div>

  <div class="answers" id="answersGrid"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
</div>

<!-- RESULT -->
<div class="result-screen" id="resultScreen">
  <div class="result-emoji" id="resultEmoji">🎉</div>
  <div class="result-title" id="resultTitle">게임 완료!</div>
  <div class="stars" id="resultStars">⭐⭐⭐</div>
  <div class="result-score" id="resultScore">8문제 중 8개 정답!</div>
  <div class="result-msg" id="resultMsg">훌륭해요! 인사를 잘 알고 있어요!</div>
  <button class="retry-btn" onclick="retryGame()">🔄 다시 하기</button>
</div>

<!-- FEEDBACK OVERLAY -->
<div class="feedback-overlay" id="feedbackOverlay">
  <div class="feedback-bubble" id="feedbackBubble">
    <div class="feedback-icon" id="feedbackIcon">⭕</div>
    <div class="feedback-text" id="feedbackText">정답!</div>
    <div class="feedback-sub" id="feedbackSub"></div>
  </div>
</div>

<script>
const questions = [
  {
    type: "상대에 따른 인사",
    emoji: "🏫👫",
    desc: "학교에서 친구를 만났어요",
    sub: "친구 사이에서는 어떻게 인사할까요?",
    correct: "안녕!",
    options: ["안녕!", "안녕하세요!", "반갑습니다.", "처음 뵙겠습니다."],
    explanation: "친구에게는 '안녕!'이라고 인사해요 😊"
  },
  {
    type: "상대에 따른 인사",
    emoji: "🏫👩‍🏫",
    desc: "복도에서 선생님을 만났어요",
    sub: "어른인 선생님께는 어떻게 인사할까요?",
    correct: "안녕하세요!",
    options: ["안녕!", "안녕하세요!", "잘 가!", "나중에 봐!"],
    explanation: "선생님께는 높임말 '안녕하세요!'를 써요 🙇"
  },
  {
    type: "상대에 따른 인사",
    emoji: "🏘️👴",
    desc: "동네에서 할아버지를 만났어요",
    sub: "나이 드신 어른께는 어떻게 인사할까요?",
    correct: "안녕하세요!",
    options: ["안녕?", "안녕하세요!", "잘 지냈어?", "야, 오랜만이야!"],
    explanation: "어른께는 허리를 숙이며 '안녕하세요!'라고 해요 🙇"
  },
  {
    type: "상황에 따른 인사",
    emoji: "🌅🏠",
    desc: "아침에 학교에 도착했어요!\n선생님께 먼저 인사해요",
    sub: "아침 등교 인사는 무엇일까요?",
    correct: "안녕하세요!",
    options: ["안녕히 계세요.", "안녕하세요!", "수고하세요.", "잘 가요!"],
    explanation: "아침에 선생님께는 '안녕하세요!'라고 인사해요 ☀️"
  },
  {
    type: "상황에 따른 인사",
    emoji: "🌆🎒",
    desc: "학교가 끝나고 선생님께\n작별 인사를 해요",
    sub: "하교할 때 선생님께 어떻게 인사할까요?",
    correct: "안녕히 계세요!",
    options: ["안녕!", "잘 가!", "안녕히 계세요!", "다음에 봐!"],
    explanation: "선생님께 작별 인사는 '안녕히 계세요!'예요 🎒"
  },
  {
    type: "상황에 따른 인사",
    emoji: "👫💛",
    desc: "친구와 하교할 때 헤어져요",
    sub: "친구에게 작별 인사는 무엇일까요?",
    correct: "잘 가!",
    options: ["안녕히 계세요.", "잘 가!", "감사합니다.", "반갑습니다."],
    explanation: "친구와 헤어질 때는 '잘 가!' 또는 '내일 봐!'라고 해요 👋"
  },
  {
    type: "상황에 따른 인사",
    emoji: "🎁🙏",
    desc: "선생님께 선물을 받았어요!\n뭐라고 인사할까요?",
    sub: "감사할 때 어른께 쓰는 인사말은?",
    correct: "감사합니다!",
    options: ["고마워!", "감사합니다!", "잘 가요.", "안녕하세요."],
    explanation: "어른께 감사할 때는 '감사합니다!'라고 해요 🙏"
  },
  {
    type: "상대에 따른 인사",
    emoji: "📅👫",
    desc: "오랫동안 못 봤던 친구를\n오늘 다시 만났어요!",
    sub: "오랜만에 만난 친구에게 뭐라고 할까요?",
    correct: "오랜만이야!",
    options: ["처음 뵙겠습니다.", "오랜만이야!", "안녕히 계세요.", "수고하세요."],
    explanation: "오랜만에 만난 친구에게는 '오랜만이야!'라고 해요 🤗"
  }
];

let current = 0;
let score = 0;
let answered = false;

function startGame() {
  document.getElementById('introScreen').style.display = 'none';
  const ga = document.getElementById('gameArea');
  ga.style.display = 'flex';
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[current];

  // progress
  document.getElementById('progressLabel').textContent = `${current + 1} / ${questions.length} 문제`;
  document.getElementById('progressFill').style.width = `${(current / questions.length) * 100}%`;

  // tag
  const tagEl = document.getElementById('qTag');
  tagEl.textContent = q.type === '상대에 따른 인사' ? '👤 상대에 따른 인사' : '📍 상황에 따른 인사';
  tagEl.style.background = q.type === '상대에 따른 인사' ? 'oklch(0.94 0.07 145)' : 'oklch(0.93 0.07 55)';
  tagEl.style.color = q.type === '상대에 따른 인사' ? 'oklch(0.42 0.18 145)' : 'oklch(0.5 0.14 60)';

  // scene
  document.getElementById('sceneEmoji').textContent = q.emoji;
  document.getElementById('sceneDesc').textContent = q.desc;
  document.getElementById('sceneSub').textContent = q.sub;

  // answers
  const grid = document.getElementById('answersGrid');
  grid.innerHTML = '';
  const shuffled = [...q.options].sort(() => Math.random() - 0.5);
  shuffled.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(opt, btn, q);
    grid.appendChild(btn);
  });

  document.getElementById('nextBtn').classList.remove('visible');

  // animate card in
  const card = document.getElementById('questionCard');
  card.style.opacity = '0';
  card.style.transform = 'translateY(20px)';
  setTimeout(() => {
    card.style.transition = 'all 0.35s ease';
    card.style.opacity = '1';
    card.style.transform = 'translateY(0)';
  }, 50);
}

function selectAnswer(choice, btn, q) {
  if (answered) return;
  answered = true;

  const isCorrect = choice === q.correct;
  const allBtns = document.querySelectorAll('.ans-btn');

  allBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent === q.correct) b.classList.add('reveal');
  });

  if (isCorrect) {
    btn.classList.add('correct');
    score += 10;
    document.getElementById('scoreDisplay').textContent = `⭐ ${score}점`;
    showFeedback(true, q.explanation);
    launchConfetti();
  } else {
    btn.classList.add('wrong');
    showFeedback(false, q.explanation);
  }

  setTimeout(() => {
    document.getElementById('nextBtn').classList.add('visible');
  }, 1200);
}

function showFeedback(correct, explanation) {
  const bubble = document.getElementById('feedbackBubble');
  const icon = document.getElementById('feedbackIcon');
  const text = document.getElementById('feedbackText');
  const sub = document.getElementById('feedbackSub');

  icon.textContent = correct ? '⭕' : '❌';
  text.textContent = correct ? '정답이에요!' : '아쉬워요!';
  text.className = 'feedback-text ' + (correct ? 'correct-fb' : 'wrong-fb');
  bubble.className = 'feedback-bubble ' + (correct ? 'correct-fb' : 'wrong-fb');
  sub.textContent = explanation;

  bubble.classList.add('show');
  setTimeout(() => bubble.classList.remove('show'), 1400);
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('gameArea').style.display = 'none';
  const result = document.getElementById('resultScreen');
  result.classList.add('show');

  const total = questions.length;
  const correct = score / 10;
  const pct = correct / total;

  document.getElementById('resultScore').textContent = `${total}문제 중 ${correct}개 정답!`;

  let emoji, title, stars, msg;
  if (pct === 1) {
    emoji = '🏆'; title = '완벽해요!'; stars = '⭐⭐⭐⭐⭐';
    msg = '모든 인사말을 알고 있어요!\n친구에게도 어른에게도 바르게 인사할 수 있겠어요!';
  } else if (pct >= 0.75) {
    emoji = '😊'; title = '잘 했어요!'; stars = '⭐⭐⭐⭐';
    msg = '인사 표현을 잘 알고 있어요!\n조금 더 연습하면 완벽해질 거예요!';
  } else if (pct >= 0.5) {
    emoji = '🙂'; title = '좋아요!'; stars = '⭐⭐⭐';
    msg = '절반 이상 맞혔어요!\n다시 한 번 도전해 보면 어떨까요?';
  } else {
    emoji = '💪'; title = '파이팅!'; stars = '⭐⭐';
    msg = '인사 표현을 조금 더 연습해 봐요!\n다시 도전해 보세요!';
  }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultStars').textContent = stars;
  document.getElementById('resultMsg').textContent = msg;

  if (pct >= 0.75) launchConfetti(60);
}

function retryGame() {
  current = 0;
  score = 0;
  answered = false;
  document.getElementById('scoreDisplay').textContent = '⭐ 0점';
  document.getElementById('resultScreen').classList.remove('show');
  const ga = document.getElementById('gameArea');
  ga.style.display = 'flex';
  renderQuestion();
}

function launchConfetti(count = 30) {
  const colors = ['#4ade80','#facc15','#60a5fa','#f472b6','#fb923c','#a78bfa'];
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.width = (Math.random() * 10 + 6) + 'px';
      el.style.height = (Math.random() * 10 + 6) + 'px';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
      el.style.animationDelay = '0s';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }, i * 40);
  }
}
</script>
